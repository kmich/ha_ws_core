blueprint:
  name: "WS Core — Rain Start / Stop"
  description: >
    Triggers when rain starts (rate goes from zero to above a minimum threshold)
    or stops. Uses the filtered rain rate sensor so brief sensor noise doesn't
    trigger false positives.
  domain: automation
  source_url: https://github.com/Aephir/ha_ws_core
  input:
    rain_rate_sensor:
      name: Rain Rate Sensor
      description: "The ws_core filtered rain rate sensor (e.g. sensor.ws_rain_rate)."
      selector:
        entity:
          domain: sensor
    min_rain_rate:
      name: Minimum Rain Rate (mm/h)
      description: "Rain must exceed this rate to be considered 'raining'."
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
          unit_of_measurement: "mm/h"
    trigger_on:
      name: Trigger On
      description: "Whether to trigger when rain starts, stops, or both."
      default: "both"
      selector:
        select:
          options:
            - label: "Rain starts"
              value: "start"
            - label: "Rain stops"
              value: "stop"
            - label: "Both"
              value: "both"
    notify_target:
      name: Notification Target
      description: "The notify service to call."
      default: notify.notify
      selector:
        text:
    start_action:
      name: Additional Action When Rain Starts (optional)
      description: "E.g. close cover.patio_awning."
      default: []
      selector:
        action:
    stop_action:
      name: Additional Action When Rain Stops (optional)
      description: "E.g. open cover.patio_awning after a delay."
      default: []
      selector:
        action:

trigger:
  - platform: numeric_state
    entity_id: !input rain_rate_sensor
    above: !input min_rain_rate
    for:
      minutes: 2
    id: rain_start
  - platform: numeric_state
    entity_id: !input rain_rate_sensor
    below: !input min_rain_rate
    for:
      minutes: 5
    id: rain_stop

condition:
  - condition: template
    value_template: >
      {% set t = trigger.id %}
      {{ (t == 'rain_start' and trigger_on in ('start', 'both')) or
         (t == 'rain_stop'  and trigger_on in ('stop',  'both')) }}

action:
  - choose:
      - conditions:
          - condition: trigger
            id: rain_start
        sequence:
          - service: !input notify_target
            data:
              title: "🌧️ Rain has started"
              message: >
                Rain rate is {{ states(trigger.entity_id) | round(1) }} mm/h.
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ start_action | length > 0 }}"
                sequence: !input start_action
      - conditions:
          - condition: trigger
            id: rain_stop
        sequence:
          - service: !input notify_target
            data:
              title: "🌤️ Rain has stopped"
              message: "Rain rate has dropped below {{ min_rain_rate }} mm/h."
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ stop_action | length > 0 }}"
                sequence: !input stop_action

mode: single
max_exceeded: silent
