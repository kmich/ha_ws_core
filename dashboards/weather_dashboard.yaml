                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                      + '<div><strong>Season total:</strong> ' + (isNaN(season) ? '--' : season.toFixed(0)) + ' \u00b0C\u00b7d</div>'
                      + '<div><strong>Base / Cap:</strong> ' + base + '\u00b0 / ' + cap + '\u00b0C</div>'
                      + '</div></div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_degree_days
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_dry_streak_days
              name: Streak Counters
              show_state: false
              show_icon: true
              icon: mdi:calendar-range
              triggers_update:
                - sensor.ws_heat_streak_days
                - sensor.ws_frost_streak_days
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#fbbf24'
              custom_fields:
                details: |
                  [[[
                    var dry = parseInt((entity && entity.state) || 0);
                    var heat = parseInt((states['sensor.ws_heat_streak_days'] || {}).state || 0);
                    var frost = parseInt((states['sensor.ws_frost_streak_days'] || {}).state || 0);
                    return '<div style="margin-top:8px;font-size:13px;color:rgba(255,255,255,0.8);line-height:2.2;">'
                      + '<div style="display:flex;justify-content:space-between;"><span>Dry</span><span style="font-size:20px;font-weight:300;color:#fbbf24;">' + dry + 'd</span></div>'
                      + '<div style="display:flex;justify-content:space-between;"><span>Heat</span><span style="font-size:20px;font-weight:300;color:#ef4444;">' + heat + 'd</span></div>'
                      + '<div style="display:flex;justify-content:space-between;"><span>Frost</span><span style="font-size:20px;font-weight:300;color:#93c5fd;">' + frost + 'd</span></div>'
                      + '</div>';
                  ]]]

      # ── 30-DAY CLIMATOLOGY ──────────────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: custom:button-card
            entity: sensor.ws_climatology_30d
            name: 30-Day Climate
            show_state: false
            show_icon: true
            icon: mdi:calendar-month
            triggers_update:
              - sensor.ws_temperature_anomaly_30d
              - sensor.ws_rain_anomaly_30d
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#818cf8'
            custom_fields:
              details: |
                [[[
                  var attrs = (entity && entity.attributes) || {};
                  var n = parseInt(entity && entity.state) || 0;
                  var hA = attrs.temp_high_avg !== undefined ? parseFloat(attrs.temp_high_avg) : null;
                  var lA = attrs.temp_low_avg !== undefined ? parseFloat(attrs.temp_low_avg) : null;
                  var rA = attrs.rain_total_avg_day !== undefined ? parseFloat(attrs.rain_total_avg_day) : null;
                  var rd = attrs.days_with_rain !== undefined ? attrs.days_with_rain : '--';
                  var fmt = function(v) { return (v === null || isNaN(v)) ? '--' : v.toFixed(1); };
                  if (n < 2) return '<div style="margin-top:8px;font-size:13px;color:rgba(255,255,255,0.5);">Building... (' + n + ' days)</div>';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:28px;font-weight:300;color:#818cf8;">' + n + '<span style="font-size:13px;color:rgba(255,255,255,0.5);"> days</span></div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                    + '<div><strong>Avg High/Low:</strong> ' + fmt(hA) + '\u00b0 / ' + fmt(lA) + '\u00b0C</div>'
                    + '<div><strong>Avg rain/day:</strong> ' + fmt(rA) + ' mm</div>'
                    + '<div><strong>Rain days:</strong> ' + rd + '</div>'
                    + '</div></div>';
                ]]]

          - type: custom:button-card
            entity: sensor.ws_temperature_anomaly_30d
            name: Today vs Normal
            show_state: false
            show_icon: true
            icon: mdi:thermometer-alert
            triggers_update:
              - sensor.ws_rain_anomaly_30d
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: |
                    [[[
                      var v = parseFloat(entity && entity.state);
                      if (isNaN(v)) return 'rgba(255,255,255,0.4)';
                      return v > 2 ? '#ef4444' : v < -2 ? '#60a5fa' : '#4ade80';
                    ]]]
            custom_fields:
              details: |
                [[[
                  var tA = parseFloat(entity && entity.state);
                  var rA = parseFloat((states['sensor.ws_rain_anomaly_30d'] || {}).state);
                  var fmt = function(v, u) { if (isNaN(v)) return '--'; return (v > 0 ? '+' : '') + v.toFixed(1) + ' ' + u; };
                  var tc = isNaN(tA) ? 'rgba(255,255,255,0.4)' : (tA > 2 ? '#ef4444' : tA < -2 ? '#60a5fa' : '#4ade80');
                  var rc = isNaN(rA) ? 'rgba(255,255,255,0.4)' : (rA > 5 ? '#3b82f6' : rA < -5 ? '#fbbf24' : '#4ade80');
                  return '<div style="margin-top:8px;">'
                    + '<div style="display:flex;gap:20px;">'
                    + '<div><div style="font-size:24px;font-weight:200;color:' + tc + ';">' + fmt(tA,'\u00b0C') + '</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">Temp anomaly</div></div>'
                    + '<div><div style="font-size:24px;font-weight:200;color:' + rc + ';">' + fmt(rA,'mm') + '</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">Rain anomaly</div></div>'
                    + '</div><div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:8px;">vs 30-day rolling average</div>'
                    + '</div>';
                ]]]

      # ── FOG & PRECIPITATION TYPE (conditional) ──────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_fog
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_fog_probability
              name: Fog Probability
              show_state: false
              show_icon: true
              icon: mdi:weather-fog
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#94a3b8'
              custom_fields:
                details: |
                  [[[
                    var prob = parseFloat(entity && entity.state);
                    var attrs = (entity && entity.attributes) || {};
                    var level = attrs.risk_level || '--';
                    var dep = attrs.dew_point_depression_c;
                    var col = prob >= 50 ? '#94a3b8' : prob >= 20 ? '#cbd5e1' : 'rgba(255,255,255,0.4)';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:36px;font-weight:200;color:' + col + ';">' + (isNaN(prob) ? '--' : prob.toFixed(0)) + '<span style="font-size:14px;color:rgba(255,255,255,0.5);"> %</span></div>'
                      + '<div style="font-size:14px;color:' + col + ';margin-top:4px;">' + level + '</div>'
                      + (dep !== undefined ? '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:6px;">T-Td: ' + parseFloat(dep).toFixed(1) + '\u00b0C</div>' : '')
                      + '</div>';
                  ]]]

          - type: custom:button-card
            entity: sensor.ws_precipitation_type
            name: Precipitation Type
            show_state: true
            show_icon: true
            icon: mdi:weather-snowy-rainy
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              state:
                - font-size: 22px
                - font-weight: 300
                - color: |
                    [[[
                      var s = (entity && entity.state) || '';
                      if (s === 'Snow') return '#93c5fd';
                      if (s === 'Sleet') return '#a5b4fc';
                      if (s === 'Freezing Rain') return '#c4b5fd';
                      if (s === 'Rain') return '#60a5fa';
                      return 'rgba(255,255,255,0.4)';
                    ]]]
              icon:
                - width: 48px
                - color: '#60a5fa'

      # ── LEARNING LAYER ──────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_metar
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_cal_suggestion_temp
              name: Cal Suggestions
              show_state: false
              show_icon: true
              icon: mdi:thermometer-alert
              triggers_update:
                - sensor.ws_learned_temp_bias
                - sensor.ws_cal_suggestion_pressure
                - sensor.ws_learned_pressure_bias
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#f59e0b'
              custom_fields:
                details: |
                  [[[
                    var tS = parseFloat((states['sensor.ws_cal_suggestion_temp'] || {}).state);
                    var tB = parseFloat((states['sensor.ws_learned_temp_bias'] || {}).state);
                    var tC = ((states['sensor.ws_cal_suggestion_temp'] || {}).attributes || {}).confidence || 'low';
                    var pS = parseFloat((states['sensor.ws_cal_suggestion_pressure'] || {}).state);
                    var pB = parseFloat((states['sensor.ws_learned_pressure_bias'] || {}).state);
                    var pC = ((states['sensor.ws_cal_suggestion_pressure'] || {}).attributes || {}).confidence || 'low';
                    var cc = function(c) { return c === 'high' ? '#4ade80' : c === 'medium' ? '#fbbf24' : 'rgba(255,255,255,0.3)'; };
                    var fmt = function(v, u) { if (isNaN(v)) return '--'; return (v > 0 ? '+' : '') + v.toFixed(1) + u; };
                    return '<div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.8);line-height:2.0;">'
                      + '<div><strong>Temp bias:</strong> ' + fmt(tB,'\u00b0C') + ' <span style="color:' + cc(tC) + ';">(' + tC + ')</span></div>'
                      + (isNaN(tS) ? '' : '<div style="color:#fbbf24;">\u21b3 Suggest: ' + fmt(tS,'\u00b0C') + '</div>')
                      + '<div><strong>Pres bias:</strong> ' + fmt(pB,' hPa') + ' <span style="color:' + cc(pC) + ';">(' + pC + ')</span></div>'
                      + (isNaN(pS) ? '' : '<div style="color:#fbbf24;">\u21b3 Suggest: ' + fmt(pS,' hPa') + '</div>')
                      + '<div style="margin-top:8px;font-size:11px;color:rgba(255,255,255,0.4);">Call ws_core.apply_learned_calibration to apply</div>'
                      + '</div>';
                  ]]]

          - type: custom:button-card
            entity: sensor.ws_forecast_skill
            name: Forecast Skill
            show_state: false
            show_icon: true
            icon: mdi:chart-bar
            triggers_update:
              - sensor.ws_solar_lux_factor
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#818cf8'
            custom_fields:
              details: |
                [[[
                  var skill = parseFloat(entity && entity.state);
                  var attrs = (entity && entity.attributes) || {};
                  var n = attrs.n_outcomes || 0;
                  var blL = attrs.blend_local !== undefined ? (attrs.blend_local * 100).toFixed(0) : '--';
                  var blA = attrs.blend_openmeteo !== undefined ? (attrs.blend_openmeteo * 100).toFixed(0) : '--';
                  var lux = parseFloat((states['sensor.ws_solar_lux_factor'] || {}).state);
                  var luxD = ((states['sensor.ws_solar_lux_factor'] || {}).attributes || {}).calibration_days || 0;
                  var sc = isNaN(skill) ? 'rgba(255,255,255,0.4)' : (skill > 0.5 ? '#4ade80' : skill > 0.2 ? '#fbbf24' : '#f87171');
                  if (n < 10) {
                    return '<div style="margin-top:8px;font-size:13px;color:rgba(255,255,255,0.5);">Building... (' + n + '/10 outcomes)</div>'
                      + '<div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.6);">'
                      + '<div><strong>Solar lux factor:</strong> ' + (isNaN(lux) ? '--' : lux.toFixed(1)) + ' (' + luxD + 'd)</div>'
                      + '</div>';
                  }
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:36px;font-weight:200;color:' + sc + ';">' + (isNaN(skill) ? '--' : (skill*100).toFixed(0)) + '<span style="font-size:14px;color:rgba(255,255,255,0.5);"> %</span></div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                    + '<div><strong>Blend local/API:</strong> ' + blL + '%/' + blA + '%</div>'
                    + '<div><strong>Outcomes:</strong> ' + n + '</div>'
                    + '<div><strong>Lux factor:</strong> ' + (isNaN(lux) ? '--' : lux.toFixed(1)) + ' (' + luxD + 'd)</div>'
                    + '</div></div>';
                ]]]

      # ── SENSOR DRIFT & CONSISTENCY ──────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: custom:button-card
            entity: sensor.ws_sensor_drift
            name: Sensor Drift (72h)
            show_state: true
            show_icon: true
            icon: mdi:chart-timeline-variant-shimmer
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              state:
                - font-size: 18px
                - color: |
                    [[[
                      return (entity && entity.state) === 'OK' ? '#4ade80' : '#f59e0b';
                    ]]]
              icon:
                - width: 48px
                - color: |
                    [[[
                      return (entity && entity.state) === 'OK' ? '#4ade80' : '#f59e0b';
                    ]]]
            custom_fields:
              details: |
                [[[
                  var drifting = ((entity && entity.attributes) || {}).drifting_sensors || [];
                  if (!drifting.length) return '<div style="margin-top:8px;font-size:12px;color:#4ade80;">\u2713 No drift detected</div>';
                  var html = '<div style="margin-top:8px;font-size:12px;line-height:1.9;">';
                  drifting.forEach(function(d) {
                    var sign = d.slope_per_h > 0 ? '+' : '';
                    html += '<div style="color:#f59e0b;">\u26a0 ' + d.sensor + ': ' + sign + (d.slope_per_h||0).toFixed(4) + ' ' + (d.unit||'') + '/h</div>';
                  });
                  return html + '</div>';
                ]]]

          - type: custom:button-card
            entity: sensor.ws_sensor_consistency
            name: Sensor Consistency
            show_state: true
            show_icon: true
            icon: mdi:compare-horizontal
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              state:
                - font-size: 18px
                - color: |
                    [[[
                      return (entity && entity.state) === 'OK' ? '#4ade80' : '#f59e0b';
                    ]]]
              icon:
                - width: 48px
                - color: |
                    [[[
                      return (entity && entity.state) === 'OK' ? '#4ade80' : '#f59e0b';
                    ]]]
            custom_fields:
              details: |
                [[[
                  var flags = ((entity && entity.attributes) || {}).flags || [];
                  if (!flags.length) return '<div style="margin-top:8px;font-size:12px;color:#4ade80;">\u2713 All cross-checks passed</div>';
                  var html = '<div style="margin-top:8px;font-size:12px;line-height:1.9;">';
                  flags.forEach(function(f) {
                    html += '<div style="color:#f59e0b;">\u26a0 ' + (f.check||'').replace(/_/g,' ') + '</div>';
                    if (f.detail) html += '<div style="color:rgba(255,255,255,0.5);padding-left:12px;font-size:11px;">' + f.detail + '</div>';
                  });
                  return html + '</div>';
                ]]]

      # ── STATION DIAGNOSTICS ──────────────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: custom:button-card
            entity: sensor.ws_station_health
            name: Station Health
            show_state: false
            show_icon: true
            icon: mdi:heart-pulse
            triggers_update:
              - sensor.ws_package_status
              - sensor.ws_alert_state
              - sensor.ws_alert_message
              - sensor.ws_battery
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: |
                    [[[
                      var s = (entity && entity.state) || '';
                      return s === 'Online' ? '#10b981' : s === 'Degraded' ? '#f59e0b' : '#ef4444';
                    ]]]
            custom_fields:
              details: |
                [[[
                  var health = (entity && entity.state) || '--';
                  var pkg = (states['sensor.ws_package_status'] || {}).state || '--';
                  var alertState = (states['sensor.ws_alert_state'] || {}).state || 'clear';
                  var alertMsg = (states['sensor.ws_alert_message'] || {}).state || 'All clear';
                  var bat = parseFloat((states['sensor.ws_battery'] || {}).state);
                  var healthColor = health === 'Online' ? '#10b981' : health === 'Degraded' ? '#f59e0b' : '#ef4444';
                  var alertColor = alertState === 'warning' ? '#ef4444' : alertState === 'advisory' ? '#f59e0b' : '#10b981';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:28px;font-weight:300;color:' + healthColor + ';">' + health + '</div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                    + '<div><strong>Package:</strong> ' + pkg + '</div>'
                    + '<div><strong>Alert:</strong> <span style="color:' + alertColor + ';">' + alertMsg + '</span></div>'
                    + (!isNaN(bat) ? '<div><strong>Battery:</strong> ' + bat.toFixed(0) + '%</div>' : '')
                    + '</div></div>';
                ]]]

          - type: custom:button-card
            entity: sensor.ws_data_quality_banner
            name: Data Quality
            show_state: false
            show_icon: true
            icon: mdi:shield-check
            triggers_update:
              - sensor.ws_sensor_quality_flags
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: |
                    [[[
                      var s = (entity && entity.state) || '';
                      return s === 'OK' ? '#10b981' : s === 'Warning' ? '#f59e0b' : '#ef4444';
                    ]]]
            custom_fields:
              details: |
                [[[
                  var banner = (entity && entity.state) || '--';
                  var dqAttrs = (entity && entity.attributes) || {};
                  var summary = dqAttrs.data_quality || '';
                  var flags = (states['sensor.ws_sensor_quality_flags'] || {});
                  var flagAttrs = flags.attributes || {};
                  var flagArray = (flagAttrs.flags && Array.isArray(flagAttrs.flags)) ? flagAttrs.flags : [];
                  var bannerColor = banner.startsWith('OK') ? '#10b981' : banner.startsWith('WARN') ? '#f59e0b' : '#ef4444';
                  var flagHtml = flagArray.slice(0, 4).map(function(f) {
                    return '<div style="color:#f59e0b;">\u26a0 ' + String(f).replace(/_/g,' ') + '</div>';
                  }).join('');
                  var allClear = flagAttrs.all_clear === true;
                  if (allClear && !flagHtml) flagHtml = '<div style="color:#10b981;">\u2713 All sensors OK</div>';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:28px;font-weight:300;color:' + bannerColor + ';">' + banner.replace('ERROR: ','').replace('WARN: ','') + '</div>'
                    + (summary && summary !== banner ? '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;">' + summary + '</div>' : '')
                    + (flagHtml ? '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.9;">' + flagHtml + '</div>' : '')
                    + '</div>';
                ]]]

      # ── RADAR ────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 1
        cards:
          - type: iframe
            url: https://www.rainviewer.com/map.html?loc=37.9838,23.7275,9&oFa=1&oC=1&oU=1&oCS=1&oF=0&oAP=1&rmt=4&c=1&o=83&lm=1
            aspect_ratio: 40%
            card_mod:
              style: |
                ha-card {
                  background: rgba(20,20,35,0.95) !important;
                  border: 1px solid rgba(255,255,255,0.08) !important;
                  border-radius: 16px !important;
                  overflow: hidden !important;
                }
      # ── WIND ROSE ────────────────────────────────────────────────────────────
      - type: grid
        column_span: 2
        columns: 1
        cards:
          - type: custom:windrose-card
            title: Wind Rose (24h)
            data_period:
              hours_to_show: 24
            wind_direction_entity:
              entity: sensor.ws_wind_direction
            windspeed_entities:
              - entity: sensor.ws_wind_speed
                name: Wind Speed
                use_for_windrose: true
                speed_range_beaufort: true
                speed_unit: mps
            cardinal_direction_letters: NESW
            windspeed_bar:
              location: bottom
            current_direction:
              show_arrow: true
            card_mod:
              style: |
                ha-card {
                  background: rgba(20,20,35,0.95) !important;
                  border: 1px solid rgba(255,255,255,0.08) !important;
                  border-radius: 16px !important;
                  min-height: 500px !important;
                }

      # ── RAIN GRAPH ───────────────────────────────────────────────────────────
      - type: grid
        column_span: 2
        columns: 1
        cards:
          - type: custom:stack-in-card
            mode: vertical
            card_mod:
              style: |
                ha-card {
                  background: rgba(20,20,35,0.95) !important;
                  border: 1px solid rgba(255,255,255,0.08) !important;
                  border-radius: 16px !important;
                  min-height: 500px !important;
                  padding: 12px !important;
                }
            cards:
              - type: custom:button-card
                entity: sensor.ws_rain_rate
                name: Rain Overview
                show_icon: true
                icon: mdi:weather-rainy
                show_state: false
                triggers_update:
                  - sensor.ws_rain_last_1h
                  - sensor.ws_rain_last_24h
                  - sensor.ws_rain_total
                  - sensor.ws_rain_rate_raw
                styles:
                  card:
                    - background: transparent
                    - border: none
                    - box-shadow: none
                    - padding: 4px 0 8px 0
                  name:
                    - font-size: 14px
                    - font-weight: 600
                    - color: rgba(255,255,255,0.7)
                  icon:
                    - width: 28px
                    - color: '#38bdf8'
                custom_fields:
                  details: |
                    [[[
                      var rate = parseFloat(entity && entity.state) || 0;
                      var rateRaw = parseFloat((states['sensor.ws_rain_rate_raw'] || {}).state) || 0;
                      var r1h = parseFloat((states['sensor.ws_rain_last_1h'] || {}).state) || 0;
                      var r24h = parseFloat((states['sensor.ws_rain_last_24h'] || {}).state) || 0;
                      var total = parseFloat((states['sensor.ws_rain_total'] || {}).state) || 0;
                      var rateColor = rate > 5 ? '#3b82f6' : rate > 0 ? '#60a5fa' : 'rgba(255,255,255,0.4)';
                      return '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,0.75);margin-top:4px;">'
                        + '<span><b style="color:' + rateColor + ';">' + rate.toFixed(1) + ' mm/h</b> now</span>'
                        + '<span><b style="color:#93c5fd;">' + r1h.toFixed(1) + ' mm</b> /1h</span>'
                        + '<span><b style="color:#60a5fa;">' + r24h.toFixed(1) + ' mm</b> /24h</span>'
                        + '<span><b style="color:rgba(255,255,255,0.6);">' + total.toFixed(0) + ' mm</b> total</span>'
                        + '</div>';
                    ]]]
              - type: custom:mini-graph-card
                entities:
                  - entity: sensor.ws_rain_rate
                    name: Rain Rate
                    color: '#38bdf8'
                hours_to_show: 24
                points_per_hour: 4
                line_width: 2
                height: 120
                animate: true
                lower_bound: 0
                smoothing: false
                show:
                  name: false
                  icon: false
                  state: false
                  legend: true
                  labels: true
                  points: hover
                  fill: fade
                card_mod:
                  style: |
                    ha-card {
                      background: transparent !important;
                      box-shadow: none !important;
                      border: none !important;
                    }
              - type: custom:mini-graph-card
                entities:
                  - entity: sensor.ws_rain_last_1h
                    name: 1h Accum.
                    color: '#60a5fa'
                  - entity: sensor.ws_rain_last_24h
                    name: 24h Accum.
                    color: '#818cf8'
                    y_axis: secondary
                hours_to_show: 24
                points_per_hour: 2
                line_width: 2
                height: 120
                animate: true
                lower_bound: 0
                smoothing: true
                show:
                  name: false
                  icon: false
                  state: false
                  legend: true
                  labels: true
                  points: hover
                  fill: fade
                card_mod:
                  style: |
                    ha-card {
                      background: transparent !important;
                      box-shadow: none !important;
                      border: none !important;
                    }
