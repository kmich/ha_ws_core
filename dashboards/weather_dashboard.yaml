              show_icon: true
              icon: mdi:sprout
              triggers_update:
                - sensor.ws_gdd_season
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#4ade80'
              custom_fields:
                details: |
                  [[[
                    var today = parseFloat(entity && entity.state);
                    var season = parseFloat((states['sensor.ws_gdd_season'] || {}).state);
                    var attrs = (entity && entity.attributes) || {};
                    var base = attrs.base_temp_c !== undefined ? attrs.base_temp_c : '--';
                    var cap = attrs.cap_temp_c !== undefined ? attrs.cap_temp_c : '--';
                    var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1); };
