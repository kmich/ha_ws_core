                      + '<div><strong>CDD rate:</strong> ' + fmt2(cddRate) + ' \u00b0C\u00b7h\u207b\u00b9</div>'
                      + '</div></div>';
                  ]]]

      # ── METAR VALIDATION (conditional) ──────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_metar
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_metar_validation
              name: METAR Validation
              show_state: false
              show_icon: true
              icon: mdi:broadcast
              triggers_update:
                - sensor.ws_metar_temperature
                - sensor.ws_temp_vs_metar_delta
                - sensor.ws_pressure_vs_metar_delta
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#67e8f9'
              custom_fields:
                details: |
                  [[[
                    var status = (entity && entity.state) || '--';
                    var metarTemp = parseFloat((states['sensor.ws_metar_temperature'] || {}).state);
                    var metarPres = parseFloat((states['sensor.ws_metar_pressure'] || {}).state);
                    var tDelta = parseFloat((states['sensor.ws_temp_vs_metar_delta'] || {}).state);
                    var pDelta = parseFloat((states['sensor.ws_pressure_vs_metar_delta'] || {}).state);
                    var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1); };
                    var statusColor = status === 'Valid' || status === 'OK' ? '#10b981' : '#f59e0b';
                    var tColor = !isNaN(tDelta) ? (Math.abs(tDelta) < 2 ? '#10b981' : '#f59e0b') : 'white';
                    var pColor = !isNaN(pDelta) ? (Math.abs(pDelta) < 3 ? '#10b981' : '#f59e0b') : 'white';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:24px;font-weight:300;color:' + statusColor + ';">' + status + '</div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:12px;line-height:1.8;">'
                      + '<div><strong>METAR Temp:</strong> ' + fmt(metarTemp) + ' \u00b0C</div>'
                      + '<div><strong>METAR Pressure:</strong> ' + fmt(metarPres) + ' hPa</div>'
                      + '<div><strong>Temp \u0394:</strong> <span style="color:' + tColor + ';">' + (tDelta >= 0 ? '+' : '') + fmt(tDelta) + ' \u00b0C</span></div>'
                      + '<div><strong>Pressure \u0394:</strong> <span style="color:' + pColor + ';">' + (pDelta >= 0 ? '+' : '') + fmt(pDelta) + ' hPa</span></div>'
                      + '</div></div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_metar
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_metar_temperature
              name: METAR vs Station
              show_state: false
              show_icon: true
              icon: mdi:scale-balance
              triggers_update:
                - sensor.ws_temperature
                - sensor.ws_metar_pressure
                - sensor.ws_sea_level_pressure
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#a5f3fc'
              custom_fields:
                details: |
                  [[[
                    var metarT = parseFloat(entity && entity.state);
                    var stationT = parseFloat((states['sensor.ws_temperature'] || {}).state);
                    var metarP = parseFloat((states['sensor.ws_metar_pressure'] || {}).state);
                    var stationP = parseFloat((states['sensor.ws_sea_level_pressure'] || {}).state);
                    var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1); };
                    return '<div style="margin-top:8px;">'
                      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;">'
                      + '<div style="text-align:center;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px;">'
                      + '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:4px;">METAR</div>'
                      + '<div style="font-size:22px;font-weight:200;color:white;">' + fmt(metarT) + '\u00b0</div>'
                      + '<div style="font-size:18px;font-weight:200;color:rgba(255,255,255,0.6);">' + fmt(metarP) + ' hPa</div>'
                      + '</div>'
                      + '<div style="text-align:center;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px;">'
                      + '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:4px;">Station</div>'
                      + '<div style="font-size:22px;font-weight:200;color:white;">' + fmt(stationT) + '\u00b0</div>'
                      + '<div style="font-size:18px;font-weight:200;color:rgba(255,255,255,0.6);">' + fmt(stationP) + ' hPa</div>'
                      + '</div>'
                      + '</div></div>';
                  ]]]

