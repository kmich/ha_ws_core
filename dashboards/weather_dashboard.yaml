                  - sensor.ws_temperature
                  - sensor.ws_wind_direction
                show_name: false
                show_state: false
                show_icon: false
                tap_action:
                  action: more-info
                  entity: sensor.ws_wind_beaufort
                custom_fields:
                  content: |
                    [[[
                      const bft = parseInt(entity?.state) || 0;
