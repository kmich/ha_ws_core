                - backdrop-filter: blur(22px)
                - '-webkit-backdrop-filter': blur(22px)
                - border-radius: 18px
                - border: 1px solid rgba(148,163,184,0.25)
                - padding: 10px 18px
                - margin-top: 2px
                - box-shadow: 0 18px 40px rgba(0,0,0,0.45)
                - height: 140px
                - min-height: 140px
                - box-sizing: border-box
                - overflow: hidden
              grid:
                - grid-template-areas: '"content"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr
            custom_fields:
              content: |
                [[[
                  try {
                    const helperStatus = states['sensor.ws_forecast_daily']?.attributes?.integration_status;
                    if (helperStatus && helperStatus.includes('missing')) {
                      return `
                        <div style='display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:8px;'>
                          <ha-icon icon='mdi:cloud-off-outline' style='--mdc-icon-size:40px; color:rgba(148,163,184,0.6);'></ha-icon>
                          <div style='font-size:14px; color:rgba(148,163,184,0.9); text-align:center;'>Open-Meteo integration not found</div>
                          <div style='font-size:11px; color:rgba(148,163,184,0.6);'>Settings → Integrations → Add → Open-Meteo</div>
                        </div>`;
                    }

                    const fcAttr = entity.attributes.tiles;
                    if (!fcAttr || !Array.isArray(fcAttr) || fcAttr.length === 0) {
                      return `
                        <div style='display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:8px;'>
                          <ha-icon icon='mdi:cloud-sync' style='--mdc-icon-size:40px; color:rgba(148,163,184,0.6);'></ha-icon>
                          <div style='font-size:14px; color:rgba(148,163,184,0.9);'>Loading forecast data...</div>
                          <div style='font-size:11px; color:rgba(148,163,184,0.6);'>Updates every 30 minutes</div>
                        </div>`;
                    }

                    const fc = fcAttr.slice(0, 5);

                    // labels come from tile.label directly

                    function mapIcon(cond, precip, prob) {
                      const precipNum = parseFloat(precip) || 0;
                      const probNum = parseInt(prob) || 0;
                      if (precipNum > 10 || probNum >= 70) return "mdi:weather-pouring";
                      if (precipNum > 2 || probNum >= 50) return "mdi:weather-rainy";
                      if (precipNum > 0.5 || probNum >= 30) return "mdi:weather-partly-rainy";

                      const c = String(cond || "").toLowerCase();
                      if (c.indexOf("snow") !== -1 || c.indexOf("sleet") !== -1) return "mdi:weather-snowy";
                      if (c.indexOf("storm") !== -1 || c.indexOf("thunder") !== -1) return "mdi:weather-lightning-rainy";
                      if (c.indexOf("rain") !== -1 || c.indexOf("shower") !== -1 || c.indexOf("drizzle") !== -1) return "mdi:weather-rainy";
                      if (c.indexOf("fog") !== -1 || c.indexOf("mist") !== -1) return "mdi:weather-fog";
                      if (c.indexOf("cloud") !== -1 || c.indexOf("overcast") !== -1) return "mdi:weather-cloudy";
                      if (c.indexOf("wind") !== -1 || c.indexOf("breeze") !== -1) return "mdi:weather-windy";
                      return "mdi:weather-sunny";
                    }

                    let tiles = "";
                    for (let i = 0; i < fc.length; i++) {
                      const d = fc[i] || {};
                      const label = d.label || 'Day ' + (i+1);
                      const tHigh = (d.tmax !== undefined) ? d.tmax : (d.tmax_c !== undefined ? d.tmax_c : d.temperature);
                      const tLow = (d.tmin !== undefined) ? d.tmin : (d.tmin_c !== undefined ? d.tmin_c : d.templow);
                      const range = (tHigh !== null && tLow !== null) ? Math.round(tHigh)+"° / "+Math.round(tLow)+"°" : (tHigh!==null?Math.round(tHigh)+"°":"—");
                      const precip = parseFloat(d.precip_mm) || 0;
                      const prob = parseInt(d.precip_prob || d.precipitation_probability) || 0;

                      let popHtml = "";
                      if (precip > 0.1) {
                        const c = (precip > 10) ? "#60A5FA" : (precip > 2 ? "#FACC15" : "#22C55E");
                        popHtml = `<div style='font-size:clamp(10px, 1.6vw, 12px); margin-top:1px; color:${c}; font-weight:600;'>💧${precip.toFixed(1)}mm</div>`;
                      } else if (prob > 0) {
                        const c = (prob > 60) ? "#60A5FA" : (prob > 30 ? "#FACC15" : "#22C55E");
                        popHtml = `<div style='font-size:clamp(10px, 1.6vw, 12px); margin-top:1px; color:${c}; font-weight:600;'>${prob}%</div>`;
                      }

                      const icon = mapIcon(d.condition, precip, prob);
                      tiles += `
                        <div style='width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:6px 2px; border-radius:12px; background:rgba(255,255,255,0.03); min-width:0;'>
                          <div style='font-size:clamp(11px, 1.8vw, 13px); font-weight:500; color:rgba(200,200,255,0.9);'>${label}</div>
                          <ha-icon icon='${icon}' style='--mdc-icon-size:clamp(24px, 4vw, 32px); color:#e0e0e0;'></ha-icon>
                          <div style='font-size:clamp(12px, 2vw, 14px); font-weight:600; color:#fff;'>${range}</div>
                          ${popHtml}
                        </div>`;
                    }

                    return `
                      <div style='display:flex; flex-direction:column; height:100%; width:100%; font-family:sans-serif;'>
                        <div style='display:flex; justify-content:space-between; margin-bottom:8px; padding:0 4px;'>
                          <span style='font-size:clamp(13px, 2.2vw, 15px); font-weight:500; color:#e0e0e0;'>5-day outlook</span>
                          <span style='font-size:clamp(9px, 1.5vw, 11px); color:rgba(255,255,255,0.5);'>Open-Meteo</span>
                        </div>
                        <div style='flex:1; display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:6px;'>${tiles}</div>
                      </div>`;
                  } catch (e) {
                    return `<div style='color:rgba(255,255,255,0.5);'>Error: ${e.message}</div>`;
                  }
                ]]]
      - type: grid
        column_span: 6
        cards:
          - type: custom:stack-in-card
            mode: vertical
            grid_options:
              columns: full
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(145deg, rgba(40,45,55,0.75) 0%, rgba(25,28,35,0.50) 100%) !important;
                  border-radius: 18px !important;
                  border: 1px solid rgba(255,255,255,0.06) !important;
                  box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
                  padding: 8px 12px !important;
                  margin-top: 4px !important;
                }
            cards:
              - type: horizontal-stack
                cards:
                  - type: custom:button-card
                    entity: select.ws_graph_range
                    name: 6h
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: select.select_option
                      service_data:
                        entity_id: select.ws_graph_range
                        option: 6h
                    styles:
                      card:
                        - background: >-
                            [[[ return (entity && entity.state === '6h') ?
                            'rgba(251,191,36,0.3)' : 'rgba(255,255,255,0.05)'
                            ]]]
                        - border-radius: 8px
                        - border: >-
                            [[[ return (entity && entity.state === '6h') ? '1px
                            solid rgba(251,191,36,0.5)' : '1px solid
                            rgba(255,255,255,0.1)' ]]]
                        - padding: 4px 8px
                        - height: 26px
                      name:
                        - font-size: 11px
                        - white-space: nowrap
                        - color: >-
                            [[[ return (entity && entity.state === '6h') ?
                            '#FBBF24' : 'rgba(255,255,255,0.6)' ]]]
                        - font-weight: >-
                            [[[ return (entity && entity.state === '6h') ? '600'
                            : '400' ]]]
                  - type: custom:button-card
                    entity: select.ws_graph_range
                    name: 24h
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: select.select_option
                      service_data:
                        entity_id: select.ws_graph_range
                        option: 24h
                    styles:
                      card:
                        - background: >-
                            [[[ return (entity && entity.state === '24h') ?
                            'rgba(251,191,36,0.3)' : 'rgba(255,255,255,0.05)'
                            ]]]
                        - border-radius: 8px
                        - border: >-
                            [[[ return (entity && entity.state === '24h') ? '1px
                            solid rgba(251,191,36,0.5)' : '1px solid
                            rgba(255,255,255,0.1)' ]]]
                        - padding: 4px 8px
                        - height: 26px
                      name:
                        - font-size: 11px
                        - white-space: nowrap
                        - color: >-
                            [[[ return (entity && entity.state === '24h') ?
                            '#FBBF24' : 'rgba(255,255,255,0.6)' ]]]
                        - font-weight: >-
                            [[[ return (entity && entity.state === '24h') ?
                            '600' : '400' ]]]
                  - type: custom:button-card
                    entity: select.ws_graph_range
                    name: 3d
                    show_icon: false
                    tap_action:
                      action: call-service
                      service: select.select_option
                      service_data:
                        entity_id: select.ws_graph_range
                        option: 3d
                    styles:
                      card:
                        - background: >-
                            [[[ return (entity && entity.state === '3d') ?
                            'rgba(251,191,36,0.3)' : 'rgba(255,255,255,0.05)'
                            ]]]
                        - border-radius: 8px
                        - border: >-
                            [[[ return (entity && entity.state === '3d') ? '1px
                            solid rgba(251,191,36,0.5)' : '1px solid
                            rgba(255,255,255,0.1)' ]]]
                        - padding: 4px 8px
                        - height: 26px
                      name:
                        - font-size: 11px
                        - white-space: nowrap
                        - color: >-
                            [[[ return (entity && entity.state === '3d') ?
                            '#FBBF24' : 'rgba(255,255,255,0.6)' ]]]
                        - font-weight: >-
                            [[[ return (entity && entity.state === '3d') ? '600'
                            : '400' ]]]
              - type: custom:config-template-card
                entities:
                  - select.ws_graph_range
                variables:
                  HOURS: >
                    states['select.ws_graph_range']?.state === '6h' ?
                    6 :

                    states['select.ws_graph_range']?.state === '3d' ?
                    72 : 24
                  PPH: >
                    states['select.ws_graph_range']?.state === '6h' ?
                    12 :

                    states['select.ws_graph_range']?.state === '3d' ?
                    1 : 4
                card:
                  type: custom:mini-graph-card
                  entities:
                    - entity: sensor.ws_temperature
                      name: Temp
                      color: '#FBBF24'
                    - entity: sensor.ws_humidity
                      name: Humidity
                      color: '#22D3EE'
                      y_axis: secondary
                  hours_to_show: ${HOURS}
                  points_per_hour: ${PPH}
                  line_width: 2
                  height: 68
                  animate: true
                  lower_bound: ~-5
                  upper_bound: ~40
                  lower_bound_secondary: ~0
                  upper_bound_secondary: ~100
                  smoothing: true
                  show:
                    name: false
                    icon: false
                    state: false
                    legend: true
                    labels: true
                    points: hover
                    extrema: true
                    fill: fade
                  card_mod:
                    style: |
                      ha-card {
                        background: transparent !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
                      .graph__legend {
                        position: absolute !important;
                        top: 0px !important;
                        right: 8px !important;
                      }
                      @media (max-width: 768px) {
                        ha-card {
                          min-height: 100px !important;
                        }
                        .graph__legend {
                          font-size: 10px !important;
                        }
                      }

  # ===========================================================================
  # SECOND PAGE: ADVANCED FEATURES
  # Clean 2-column layout — every section uses columns: 2
  # Sections: Nav | Sky | Activity Scores | Rain Detail | Wind Detail |
  #           Pressure & Zambretti | Temperature Extended | Air & Pollen |
  #           Moon & Solar | ET₀ & Degree Days | Upload Status |
  #           METAR Validation | Station Diagnostics | Radar & Wind Rose
  # ===========================================================================
  - title: Advanced
    path: advanced
    icon: mdi:flask-outline
    type: sections
    max_columns: 4
    dense_section_placement: false
    subview: true
    sections:

      # ── NAVIGATION ──────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 1
        cards:
          - type: custom:button-card
            name: "← Back to Weather"
            show_icon: false
            show_state: false
            tap_action:
              action: navigate
              navigation_path: weather
            styles:
              card:
                - background: rgba(30,30,30,0.7)
                - border-radius: 14px
                - padding: 10px 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 14px
                - font-weight: 500
                - color: rgba(255,255,255,0.7)
                - justify-self: start


      # ── CURRENT CONDITIONS & FORECAST ────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: custom:button-card
            entity: sensor.ws_current_condition
            name: Current Conditions
            show_state: false
            show_icon: true
            icon: mdi:weather-partly-cloudy
            triggers_update:
              - sensor.ws_wind_gust
              - sensor.ws_temperature
              - sensor.ws_rain_rate
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: |
                    [[[
                      var attrs = (entity && entity.attributes) || {};
                      return attrs.color || '#60a5fa';
                    ]]]
            custom_fields:
              details: |
                [[[
                  var desc = (entity && entity.attributes && entity.attributes.description) || (entity && entity.state) || '--';
                  var severity = (entity && entity.attributes && entity.attributes.severity) || '--';
                  var icon = (entity && entity.attributes && entity.attributes.icon) || '';
                  var color = (entity && entity.attributes && entity.attributes.color) || '#60a5fa';
                  var temp = parseFloat((states['sensor.ws_temperature'] || {}).state);
                  var gust = parseFloat((states['sensor.ws_wind_gust'] || {}).state);
                  var rainRate = parseFloat((states['sensor.ws_rain_rate'] || {}).state) || 0;
                  var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1); };
                  var sevColor = severity === 'Extreme' ? '#991b1b' : severity === 'High' ? '#ef4444' : severity === 'Moderate' ? '#f59e0b' : severity === 'Low' ? '#fbbf24' : '#10b981';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:22px;font-weight:400;color:' + color + ';">' + desc + '</div>'
                    + '<div style="display:inline-block;margin-top:6px;padding:2px 10px;border-radius:8px;background:' + sevColor + '22;border:1px solid ' + sevColor + '55;font-size:12px;font-weight:600;color:' + sevColor + ';">Severity: ' + severity + '</div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                    + '<div><strong>Temp:</strong> ' + fmt(temp) + ' °C</div>'
                    + '<div><strong>Wind Gust:</strong> ' + fmt(gust) + ' m/s</div>'
                    + (rainRate > 0 ? '<div style="color:#60a5fa;"><strong>Rain:</strong> ' + rainRate.toFixed(1) + ' mm/h</div>' : '')
                    + '</div></div>';
                ]]]

          - type: custom:button-card
            entity: sensor.ws_forecast_daily
            name: Forecast Data
            show_state: true
            show_icon: true
            icon: mdi:calendar-weather
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              state:
                - font-size: 13px
                - color: rgba(255,255,255,0.5)
                - margin-top: 4px
              icon:
                - width: 48px
                - color: '#818cf8'
            custom_fields:
              details: |
                [[[
                  var attrs = (entity && entity.attributes) || {};
                  var provider = (entity && entity.state) || '--';
                  var days = attrs.days || attrs.daily || attrs.forecast || [];
                  var count = Array.isArray(days) ? days.length : (attrs.count || 0);
                  var updated = attrs.updated_at || attrs.fetched_at || '';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:18px;font-weight:300;color:white;">' + provider + '</div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:10px;line-height:1.8;">'
                    + (count ? '<div><strong>Days:</strong> ' + count + '</div>' : '')
                    + (updated ? '<div><strong>Updated:</strong> ' + updated + '</div>' : '')
                    + '</div></div>';
                ]]]

      # ── SKY: MOON & STARGAZING / UV EXPOSURE ────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_stargazing_score
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_stargazing_quality
              name: Moon & Stargazing
              show_state: false
              show_icon: true
              icon: mdi:telescope
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#e2e8f0'
              custom_fields:
                details: |
                  [[[
                    var score = parseInt(entity && entity.state) || 0;
                    var attrs = (entity && entity.attributes) || {};
                    var moonPhase = attrs.moon_phase || 'unknown';
                    var moonImpact = attrs.moon_impact || '';
                    var rainRate = parseFloat((states['sensor.ws_rain_rate'] || {}).state) || 0;
                    var humidity = parseFloat((states['sensor.ws_humidity'] || {}).state) || 0;
                    var scoreColor = score >= 70 ? '#10b981' : score >= 40 ? '#fbbf24' : '#6b7280';
                    var quality = score >= 70 ? 'Excellent' : score >= 50 ? 'Good' : score >= 30 ? 'Fair' : 'Poor';
                    var phaseName = moonPhase.replace(/_/g, ' ');
                    var rainNote = rainRate > 0 ? '<div style="color:#ef4444;margin-top:4px;">Raining: ' + rainRate.toFixed(1) + ' mm/h</div>' : '';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:32px;font-weight:300;color:' + scoreColor + ';">' + score + '/100</div>'
                      + '<div style="font-size:13px;font-weight:600;color:' + scoreColor + ';margin-top:2px;">' + quality + '</div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:8px;line-height:1.8;">'
                      + '<div><strong>Moon:</strong> ' + phaseName + '</div>'
                      + '<div><strong>Impact:</strong> ' + moonImpact + '</div>'
                      + '<div><strong>Humidity:</strong> ' + humidity + '%</div>'
                      + rainNote
                      + '</div></div>';
                  ]]]

          - type: custom:button-card
            entity: sensor.ws_uv_level
            name: UV Exposure
            show_state: false
            show_icon: true
            icon: mdi:sun-wireless
            triggers_update:
              - sensor.ws_uv_index
              - sensor.ws_illuminance
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#fbbf24'
            custom_fields:
              details: |
                [[[
                  var level = (entity && entity.state) || '--';
                  var attrs = (entity && entity.attributes) || {};
                  var uvi = parseFloat((states['sensor.ws_uv_index'] || {}).state) || parseFloat(attrs.uv_index) || 0;
                  var burnTime = attrs.burn_time_fair_skin || 'N/A';
                  var rec = attrs.recommendation || '';
                  var lux = parseFloat((states['sensor.ws_illuminance'] || {}).state);
                  var levelColor = level === 'Extreme' ? '#991b1b' : level === 'Very High' ? '#dc2626' : level === 'High' ? '#f97316' : level === 'Moderate' ? '#f59e0b' : '#10b981';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:32px;font-weight:200;color:' + levelColor + ';">' + level + '</div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:8px;line-height:1.8;">'
                    + '<div><strong>UV Index:</strong> ' + uvi.toFixed(1) + '</div>'
                    + '<div><strong>Burn time (fair skin):</strong> ' + burnTime + '</div>'
                    + '<div><strong>Illuminance:</strong> ' + (!isNaN(lux) ? lux.toLocaleString() + ' lx' : '--') + '</div>'
                    + (rec ? '<div style="margin-top:6px;font-size:11px;color:rgba(255,255,255,0.5);font-style:italic;">' + rec + '</div>' : '')
                    + '</div></div>';
                ]]]

      # ── ACTIVITY SCORES (conditional) ───────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 4
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_laundry_score
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_laundry_drying_score
              name: Laundry Drying
              show_state: false
              show_icon: true
              icon: mdi:hanger
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: |
                      [[[
                        var score = parseInt(entity && entity.state) || 0;
                        if (score >= 75) return '#10b981';
                        if (score >= 50) return '#fbbf24';
                        if (score >= 25) return '#f59e0b';
                        return '#6b7280';
                      ]]]
              custom_fields:
                score: |
                  [[[
                    var score = parseInt(entity && entity.state) || 0;
                    var attrs = (entity && entity.attributes) || {};
                    var recommendation = attrs.recommendation || '';
                    var dryTime = attrs.estimated_dry_time || 'N/A';
                    var scoreColor = score >= 75 ? '#10b981' : score >= 50 ? '#fbbf24' : score >= 25 ? '#f59e0b' : '#6b7280';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:32px;font-weight:300;color:' + scoreColor + ';">' + score + '/100</div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:8px;"><strong>Dry time:</strong> ' + dryTime + '</div>'
                      + '<div style="font-size:11px;color:rgba(255,255,255,0.6);margin-top:4px;font-style:italic;">' + recommendation + '</div>'
                      + '</div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_running_score
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_running_score
              name: Running Score
              show_state: false
              show_icon: true
              icon: mdi:run
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: |
                      [[[
                        var score = parseInt(entity && entity.state) || 0;
                        if (score >= 75) return '#10b981';
                        if (score >= 50) return '#fbbf24';
                        if (score >= 25) return '#f59e0b';
                        return '#6b7280';
                      ]]]
              custom_fields:
                score: |
                  [[[
                    var score = parseInt(entity && entity.state) || 0;
                    var attrs = (entity && entity.attributes) || {};
                    var level = attrs.level || '';
                    var recommendation = attrs.recommendation || '';
                    var feelsLike = attrs.feels_like_c;
                    var uv = attrs.uv_index;
                    var scoreColor = score >= 75 ? '#10b981' : score >= 50 ? '#fbbf24' : score >= 25 ? '#f59e0b' : '#6b7280';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:32px;font-weight:300;color:' + scoreColor + ';">' + score + '/100 <span style="font-size:14px;color:rgba(255,255,255,0.6);">' + level + '</span></div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:8px;line-height:1.8;">'
                      + (feelsLike !== undefined ? '<div>Feels like: ' + parseFloat(feelsLike).toFixed(1) + '\u00b0C</div>' : '')
                      + (uv !== undefined ? '<div>UV: ' + uv + '</div>' : '')
                      + '</div>'
                      + '<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px;font-style:italic;">' + recommendation + '</div>'
                      + '</div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_fire_risk_score
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_fire_risk_score
              name: Fire Risk Score
              show_state: false
              show_icon: true
              icon: mdi:fire
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: |
                      [[[
                        var fwi = parseFloat(entity && entity.state) || 0;
                        if (fwi >= 50) return '#991b1b';
                        if (fwi >= 30) return '#dc2626';
                        if (fwi >= 19) return '#f59e0b';
                        if (fwi >= 8) return '#fbbf24';
                        return '#10b981';
                      ]]]
              custom_fields:
                score: |
                  [[[
                    var fwi = parseFloat(entity && entity.state) || 0;
                    var attrs = (entity && entity.attributes) || {};
                    var level = attrs.danger_level || 'Low';
                    var temp = attrs.temperature_c;
                    var humid = attrs.humidity_pct;
                    var wind = attrs.wind_ms;
                    var levelColor = level === 'Catastrophic' ? '#991b1b' : level === 'Extreme' ? '#dc2626' : level === 'Very High' ? '#ef4444' : level === 'High' ? '#f59e0b' : level === 'Moderate' ? '#fbbf24' : '#10b981';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:32px;font-weight:300;color:white;">' + fwi.toFixed(0) + ' <span style="font-size:14px;color:' + levelColor + ';font-weight:600;">' + level + '</span></div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:8px;line-height:1.8;">'
                      + '<div>Temp: ' + (temp !== undefined ? parseFloat(temp).toFixed(1) + 'C' : 'N/A') + '</div>'
                      + '<div>Humidity: ' + (humid !== undefined ? humid + '%' : 'N/A') + '</div>'
                      + '<div>Wind: ' + (wind !== undefined ? parseFloat(wind).toFixed(1) + ' m/s' : 'N/A') + '</div>'
                      + '</div></div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_sea_temp
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_sea_surface_temperature
              name: Sea Temperature
              show_state: false
              show_icon: true
              icon: mdi:waves
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: |
                      [[[
                        var t = parseFloat(entity && entity.state) || 0;
                        if (t >= 28) return '#ef4444';
                        if (t >= 24) return '#f59e0b';
                        if (t >= 20) return '#10b981';
                        if (t >= 16) return '#06b6d4';
                        return '#3b82f6';
                      ]]]
              custom_fields:
                details: |
                  [[[
                    var t = parseFloat(entity && entity.state);
                    var attrs = (entity && entity.attributes) || {};
                    var comfort = attrs.comfort || '--';
                    var comfortColor = comfort === 'Hot' ? '#ef4444' : comfort === 'Warm' ? '#f59e0b' : comfort === 'Comfortable' ? '#10b981' : comfort === 'Cool' ? '#06b6d4' : '#3b82f6';
                    var hourly = attrs.hourly_forecast || [];
                    var minT = t, maxT = t;
                    for (var i = 0; i < hourly.length; i++) {
                      var v = hourly[i].sst_c;
                      if (v !== null && v !== undefined) { if (v < minT) minT = v; if (v > maxT) maxT = v; }
                    }
                    var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1); };
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:36px;font-weight:200;color:white;">' + fmt(t) + ' <span style="font-size:14px;color:rgba(255,255,255,0.5);">\u00b0C</span></div>'
                      + '<div style="display:inline-block;margin-top:6px;padding:3px 10px;border-radius:8px;background:' + comfortColor + '22;border:1px solid ' + comfortColor + '55;font-size:13px;font-weight:600;color:' + comfortColor + ';">' + comfort + '</div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:10px;line-height:1.8;">'
                      + '<div><strong>24h range:</strong> ' + fmt(minT) + ' \u2013 ' + fmt(maxT) + ' \u00b0C</div>'
                      + '</div></div>';
                  ]]]

      # ── RAIN DETAIL ─────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: custom:button-card
            entity: sensor.ws_rain_rate
            name: Rain Accumulations
            show_state: false
            show_icon: true
            icon: mdi:water-outline
            triggers_update:
              - sensor.ws_rain_rate_raw
              - sensor.ws_rain_last_1h
              - sensor.ws_rain_last_24h
              - sensor.ws_rain_total
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#38bdf8'
            custom_fields:
              details: |
                [[[
                  var rate = parseFloat(entity && entity.state) || 0;
                  var rateRaw = parseFloat((states['sensor.ws_rain_rate_raw'] || {}).state) || 0;
                  var r1h = parseFloat((states['sensor.ws_rain_last_1h'] || {}).state) || 0;
                  var r24h = parseFloat((states['sensor.ws_rain_last_24h'] || {}).state) || 0;
                  var total = parseFloat((states['sensor.ws_rain_total'] || {}).state) || 0;
                  var rateColor = rate > 5 ? '#3b82f6' : rate > 0 ? '#60a5fa' : 'rgba(255,255,255,0.4)';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:32px;font-weight:200;color:' + rateColor + ';">' + rate.toFixed(1) + '<span style="font-size:14px;color:rgba(255,255,255,0.5);"> mm/h</span></div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                    + '<div><strong>Raw rate:</strong> ' + rateRaw.toFixed(1) + ' mm/h</div>'
                    + '<div><strong>Last 1h:</strong> ' + r1h.toFixed(1) + ' mm</div>'
                    + '<div><strong>Last 24h:</strong> ' + r24h.toFixed(1) + ' mm</div>'
                    + '<div><strong>Total acc.:</strong> ' + total.toFixed(1) + ' mm</div>'
                    + '</div></div>';
                ]]]

          - type: custom:button-card
            entity: sensor.ws_rain_probability_combined
            name: Rain Analysis
            show_state: false
            show_icon: true
            icon: mdi:weather-rainy
            triggers_update:
              - sensor.ws_time_since_rain
              - sensor.ws_rain_probability
              - sensor.ws_sea_level_pressure
              - sensor.ws_pressure_trend
              - sensor.ws_wind_quadrant
              - sensor.ws_zambretti_forecast
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: |
                    [[[
                      var prob = parseFloat(entity && entity.state) || 0;
                      if (prob >= 70) return '#3b82f6';
                      if (prob >= 40) return '#60a5fa';
                      return '#10b981';
                    ]]]
            custom_fields:
              details: |
                [[[
                  var combined = parseFloat(entity && entity.state) || 0;
                  var attrs = (entity && entity.attributes) || {};
                  var local = attrs.local_probability_pct || 0;
                  var tsr = (states['sensor.ws_time_since_rain'] || {}).state || '--';
                  var prob = parseFloat((states['sensor.ws_rain_probability'] || {}).state) || 0;
                  var zamb = (states['sensor.ws_zambretti_forecast'] || {}).state || '--';
                  var probColor = combined >= 70 ? '#3b82f6' : combined >= 40 ? '#60a5fa' : '#10b981';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:40px;font-weight:200;color:' + probColor + ';">' + combined.toFixed(0) + '%</div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:8px;line-height:1.8;">'
                    + '<div><strong>Local sensors:</strong> ' + local + '%</div>'
                    + '<div><strong>Time since rain:</strong> ' + tsr + '</div>'
                    + '<div><strong>Zambretti:</strong> ' + zamb + '</div>'
                    + '</div></div>';
                ]]]

      # ── WIND DETAIL ─────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: custom:button-card
            entity: sensor.ws_wind_beaufort
            name: Wind Detail
            show_state: false
            show_icon: true
            icon: mdi:weather-windy
            triggers_update:
              - sensor.ws_wind_speed
              - sensor.ws_wind_gust
              - sensor.ws_wind_gust_max_24h
              - sensor.ws_wind_quadrant
              - sensor.ws_wind_direction
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#93c5fd'
            custom_fields:
              details: |
                [[[
                  var bft = parseInt(entity && entity.state) || 0;
                  var attrs = (entity && entity.attributes) || {};
                  var bftDesc = attrs.description || '';
                  var speedMs = parseFloat(attrs.speed_ms);
                  var gustMs = parseFloat(attrs.gust_ms);
                  var gustMax = parseFloat((states['sensor.ws_wind_gust_max_24h'] || {}).state);
                  var quadrant = (states['sensor.ws_wind_quadrant'] || {}).state || '--';
                  var dir = parseFloat((states['sensor.ws_wind_direction'] || {}).state);
                  var fmt = function(v) { return isNaN(v) ? '--' : parseFloat(v).toFixed(1); };
                  var toKmh = function(v) { return isNaN(v) ? '--' : (parseFloat(v) * 3.6).toFixed(1); };
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:28px;font-weight:300;color:white;">Bft ' + bft + ' <span style="font-size:14px;color:rgba(255,255,255,0.6);">' + bftDesc + '</span></div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:8px;line-height:1.8;">'
                    + '<div><strong>Speed:</strong> ' + fmt(speedMs) + ' m/s (' + toKmh(speedMs) + ' km/h)</div>'
                    + '<div><strong>Gust:</strong> ' + fmt(gustMs) + ' m/s (' + toKmh(gustMs) + ' km/h)</div>'
                    + '<div><strong>24h Max Gust:</strong> ' + fmt(gustMax) + ' m/s (' + toKmh(gustMax) + ' km/h)</div>'
                    + '<div><strong>Direction:</strong> ' + (isNaN(dir) ? '--' : dir.toFixed(0)) + '\u00b0 ' + quadrant + '</div>'
                    + '</div></div>';
                ]]]

          - type: custom:button-card
            entity: sensor.ws_wind_direction
            name: Wind Direction
            show_state: false
            show_icon: true
            icon: mdi:compass-rose
            triggers_update:
              - sensor.ws_wind_direction_smooth
              - sensor.ws_wind_quadrant
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#a78bfa'
            custom_fields:
              details: |
                [[[
                  var raw = parseFloat(entity && entity.state);
                  var smooth = parseFloat((states['sensor.ws_wind_direction_smooth'] || {}).state);
                  var quadrant = (states['sensor.ws_wind_quadrant'] || {}).state || '--';
                  var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1) + '\u00b0'; };
                  var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
                  var compass = !isNaN(raw) ? dirs[Math.round(raw / 22.5) % 16] : '--';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:40px;font-weight:200;color:white;">' + fmt(raw) + ' <span style="font-size:18px;color:rgba(255,255,255,0.6);">' + compass + '</span></div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                    + '<div><strong>Smoothed:</strong> ' + fmt(smooth) + '</div>'
                    + '<div><strong>Quadrant:</strong> ' + quadrant + '</div>'
                    + '</div></div>';
                ]]]

      # ── PRESSURE & ZAMBRETTI ─────────────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: custom:button-card
            entity: sensor.ws_sea_level_pressure
            name: Pressure Detail
            show_state: false
            show_icon: true
            icon: mdi:gauge
            triggers_update:
              - sensor.ws_station_pressure
              - sensor.ws_pressure_trend
              - sensor.ws_pressure_change_window
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#a78bfa'
            custom_fields:
              details: |
                [[[
                  var mslp = parseFloat(entity && entity.state);
                  var station = parseFloat((states['sensor.ws_station_pressure'] || {}).state);
                  var trend = (states['sensor.ws_pressure_trend'] || {}).state || '--';
                  var change3h = parseFloat((states['sensor.ws_pressure_change_window'] || {}).state);
                  var zambretti = (states['sensor.ws_zambretti_forecast'] || {}).state || '--';
                  var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1); };
                  var changeColor = isNaN(change3h) ? 'white' : change3h > 0.8 ? '#10b981' : change3h < -0.8 ? '#ef4444' : 'rgba(255,255,255,0.7)';
                  var changeStr = isNaN(change3h) ? '--' : (change3h >= 0 ? '+' : '') + change3h.toFixed(1);
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:36px;font-weight:200;color:white;">' + fmt(mslp) + ' <span style="font-size:14px;color:rgba(255,255,255,0.5);">hPa</span></div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:8px;line-height:1.8;">'
                    + '<div><strong>Station:</strong> ' + fmt(station) + ' hPa</div>'
                    + '<div><strong>Trend:</strong> ' + trend + ' <span style="color:' + changeColor + ';">(' + changeStr + ' hPa/3h)</span></div>'
                    + '<div><strong>Forecast:</strong> ' + zambretti + '</div>'
                    + '</div></div>';
                ]]]

          - type: custom:button-card
            entity: sensor.ws_zambretti_forecast
            name: Zambretti Detail
            show_state: false
            show_icon: true
            icon: mdi:barometer
            triggers_update:
              - sensor.ws_zambretti_number
              - sensor.ws_pressure_trend_raw
              - sensor.ws_pressure_change_window
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#c084fc'
            custom_fields:
              details: |
                [[[
                  var forecast = (entity && entity.state) || '--';
                  var zNum = (states['sensor.ws_zambretti_number'] || {}).state || '--';
                  var trend = (states['sensor.ws_pressure_trend'] || {}).state || '--';
                  var trendRaw = parseFloat((states['sensor.ws_pressure_trend_raw'] || {}).state);
                  var change = parseFloat((states['sensor.ws_pressure_change_window'] || {}).state);
                  var trendColor = !isNaN(change) ? (change > 0.8 ? '#10b981' : change < -0.8 ? '#ef4444' : 'rgba(255,255,255,0.7)') : 'rgba(255,255,255,0.7)';
                  var changeStr = !isNaN(change) ? (change >= 0 ? '+' : '') + change.toFixed(1) + ' hPa/3h' : '--';
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:16px;font-weight:500;color:white;line-height:1.3;">' + forecast + '</div>'
                    + '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;">Zambretti #' + zNum + '</div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:12px;line-height:1.8;">'
                    + '<div><strong>Trend:</strong> ' + trend + '</div>'
                    + '<div><strong>Rate:</strong> <span style="color:' + trendColor + ';">' + changeStr + '</span></div>'
                    + '<div><strong>Raw rate:</strong> ' + (!isNaN(trendRaw) ? trendRaw.toFixed(2) + ' hPa/h' : '--') + '</div>'
                    + '</div></div>';
                ]]]

