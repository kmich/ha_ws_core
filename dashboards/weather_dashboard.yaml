      # ── DISPLAY SENSORS (conditional) ───────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_display_sensors
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_rain_display
              name: Rain Display
              show_state: false
              show_icon: true
              icon: mdi:weather-rainy
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#38bdf8'
              custom_fields:
                details: |
                  [[[
                    var attrs = (entity && entity.attributes) || {};
                    var rate = parseFloat(attrs.rain_rate) || 0;
                    var today = parseFloat(attrs.rain_today) || 0;
                    var h24 = parseFloat(attrs.rain_24h) || 0;
                    var isRaining = attrs.is_raining === true;
                    var rateColor = rate > 5 ? '#3b82f6' : rate > 0 ? '#60a5fa' : 'rgba(255,255,255,0.4)';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:32px;font-weight:200;color:' + rateColor + ';">' + rate.toFixed(1) + '<span style="font-size:14px;color:rgba(255,255,255,0.5);"> mm/h</span></div>'
                      + (isRaining ? '<div style="font-size:12px;color:#60a5fa;margin-top:4px;">Currently raining</div>' : '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;">Not raining</div>')
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                      + '<div><strong>Today:</strong> ' + today.toFixed(1) + ' mm</div>'
                      + '<div><strong>Last 24h:</strong> ' + h24.toFixed(1) + ' mm</div>'
                      + '</div></div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_display_sensors
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_temperature_display
              name: Temperature Display
              show_state: false
              show_icon: true
              icon: mdi:thermometer
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: |
                      [[[
                        var attrs = (entity && entity.attributes) || {};
                        return attrs.color || '#60a5fa';
                      ]]]
              custom_fields:
                details: |
                  [[[
                    var state = (entity && entity.state) || '--';
                    var attrs = (entity && entity.attributes) || {};
                    var pct = parseFloat(attrs.bar_percent) || 50;
                    var color = attrs.color || '#60a5fa';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:36px;font-weight:200;color:white;">' + state + '<span style="font-size:14px;color:rgba(255,255,255,0.5);"> °C</span></div>'
                      + '<div style="margin-top:10px;background:rgba(255,255,255,0.1);border-radius:4px;height:6px;">'
                      + '<div style="width:' + Math.min(100,Math.max(0,pct)) + '%;height:100%;background:' + color + ';border-radius:4px;"></div>'
                      + '</div>'
                      + '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">' + pct.toFixed(0) + '% of range</div>'
                      + '</div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_display_sensors
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_forecast_tiles
              name: Forecast Tiles
              show_state: false
              show_icon: true
              icon: mdi:calendar-weather
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#818cf8'
              custom_fields:
                details: |
                  [[[
                    var attrs = (entity && entity.attributes) || {};
                    var tiles = attrs.tiles || [];
                    var count = attrs.count || tiles.length || 0;
                    var html = '<div style="margin-top:8px;">'
                      + '<div style="font-size:13px;color:rgba(255,255,255,0.5);">' + count + ' day forecast</div>'
                      + '<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">';
                    for (var i = 0; i < Math.min(tiles.length, 5); i++) {
                      var t = tiles[i];
                      var label = t.label || t.day || '';
                      var icon = t.icon || 'mdi:weather-cloudy';
                      var high = t.high_c !== undefined ? parseFloat(t.high_c).toFixed(0) : (t.temp_high !== undefined ? parseFloat(t.temp_high).toFixed(0) : '--');
                      var low = t.low_c !== undefined ? parseFloat(t.low_c).toFixed(0) : (t.temp_low !== undefined ? parseFloat(t.temp_low).toFixed(0) : '--');
                      html += '<div style="flex:1;text-align:center;padding:6px 4px;background:rgba(255,255,255,0.05);border-radius:8px;">'
                        + '<div style="font-size:10px;color:rgba(255,255,255,0.4);">' + label + '</div>'
                        + '<div style="font-size:11px;color:white;margin-top:4px;">' + high + '°/' + low + '°</div>'
                        + '</div>';
                    }
                    html += '</div></div>';
                    return html;
                  ]]]


      # ── GDD & STREAKS (conditional) ──────────────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: conditional
