              name: Moon Phase
              show_state: false
              show_icon: true
              icon: mdi:moon-waning-crescent
              triggers_update:
                - sensor.ws_moon_illumination
                - sensor.ws_moon_phase
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#e2e8f0'
              custom_fields:
                details: |
                  [[[
                    var phase = (entity && entity.state) || '--';
                    var illum = parseFloat((states['sensor.ws_moon_illumination'] || {}).state);
                    var phaseKey = (states['sensor.ws_moon_phase'] || {}).state || '--';
                    var phaseName = phaseKey.replace(/_/g, ' ');
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:28px;font-weight:200;color:white;">' + phase + '</div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                      + '<div><strong>Phase:</strong> ' + phaseName + '</div>'
                      + '<div><strong>Illumination:</strong> ' + (!isNaN(illum) ? illum.toFixed(0) + '%' : '--') + '</div>'
                      + '</div></div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_solar_forecast
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_solar_forecast_today
              name: Solar Forecast
              show_state: false
              show_icon: true
              icon: mdi:solar-power
              triggers_update:
                - sensor.ws_solar_forecast_tomorrow
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#fbbf24'
              custom_fields:
                details: |
                  [[[
                    var today = parseFloat(entity && entity.state);
                    var tomorrow = parseFloat((states['sensor.ws_solar_forecast_tomorrow'] || {}).state);
                    var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(2); };
                    var diff = (!isNaN(today) && !isNaN(tomorrow)) ? (tomorrow - today) : NaN;
                    var diffColor = !isNaN(diff) ? (diff > 0 ? '#10b981' : diff < 0 ? '#ef4444' : 'rgba(255,255,255,0.5)') : 'rgba(255,255,255,0.5)';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:36px;font-weight:200;color:#fbbf24;">' + fmt(today) + '<span style="font-size:14px;color:rgba(255,255,255,0.5);"> kWh today</span></div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                      + '<div><strong>Tomorrow:</strong> ' + fmt(tomorrow) + ' kWh</div>'
                      + (!isNaN(diff) ? '<div><strong>Change:</strong> <span style="color:' + diffColor + ';">' + (diff >= 0 ? '+' : '') + diff.toFixed(2) + ' kWh</span></div>' : '')
                      + '</div></div>';
                  ]]]

