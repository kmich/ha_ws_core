              - sensor.ws_frost_point
            styles:
              card:
                - background: rgba(30,30,30,0.9)
                - border-radius: 14px
                - padding: 16px
                - border: 1px solid rgba(255,255,255,0.1)
              name:
                - font-size: 16px
                - font-weight: 600
                - color: white
              icon:
                - width: 48px
                - color: '#7dd3fc'
            custom_fields:
              details: |
                [[[
                  var avg = parseFloat(entity && entity.state);
                  var wetBulb = parseFloat((states['sensor.ws_wet_bulb'] || {}).state);
                  var frost = parseFloat((states['sensor.ws_frost_point'] || {}).state);
                  var dew = parseFloat((states['sensor.ws_dew_point'] || {}).state);
                  var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1); };
                  return '<div style="margin-top:8px;">'
                    + '<div style="font-size:36px;font-weight:200;color:white;">' + fmt(avg) + '<span style="font-size:16px;color:rgba(255,255,255,0.5);"> \u00b0C avg</span></div>'
                    + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                    + '<div><strong>Dew point:</strong> ' + fmt(dew) + ' \u00b0C</div>'
                    + '<div><strong>Wet-bulb:</strong> ' + fmt(wetBulb) + ' \u00b0C</div>'
                    + '<div><strong>Frost point:</strong> ' + fmt(frost) + ' \u00b0C</div>'
                    + '</div></div>';
                ]]]

      # ── AIR QUALITY & POLLEN (conditional) ──────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_air_quality
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_air_quality_level
              name: Air Quality
              show_state: false
              show_icon: true
              icon: mdi:air-filter
              triggers_update:
                - sensor.ws_air_quality_index
                - sensor.ws_pm2_5
                - sensor.ws_pm10
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#34d399'
              custom_fields:
                details: |
                  [[[
                    var level = (entity && entity.state) || '--';
                    var aqi = parseFloat((states['sensor.ws_air_quality_index'] || {}).state);
                    var pm25 = parseFloat((states['sensor.ws_pm2_5'] || {}).state);
                    var pm10 = parseFloat((states['sensor.ws_pm10'] || {}).state);
                    var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(1); };
                    var aqiColor = aqi >= 300 ? '#7c3aed' : aqi >= 200 ? '#dc2626' : aqi >= 150 ? '#f97316' : aqi >= 100 ? '#f59e0b' : aqi >= 50 ? '#facc15' : '#10b981';
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:36px;font-weight:200;color:' + aqiColor + ';">' + (!isNaN(aqi) ? aqi.toFixed(0) : '--') + '<span style="font-size:14px;color:rgba(255,255,255,0.5);"> AQI</span></div>'
                      + '<div style="font-size:13px;color:' + aqiColor + ';margin-top:2px;">' + level + '</div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                      + '<div><strong>PM2.5:</strong> ' + fmt(pm25) + ' \u03bcg/m\u00b3</div>'
                      + '<div><strong>PM10:</strong> ' + fmt(pm10) + ' \u03bcg/m\u00b3</div>'
                      + '</div></div>';
                  ]]]

          - type: conditional
            conditions:
              - condition: state
                entity: switch.ws_enable_pollen
                state: "on"
            card:
              type: custom:button-card
              entity: sensor.ws_pollen_level
              name: Pollen
              show_state: false
              show_icon: true
              icon: mdi:flower-pollen
              triggers_update:
                - sensor.ws_pollen_grass
                - sensor.ws_pollen_tree
                - sensor.ws_pollen_weed
              styles:
                card:
                  - background: rgba(30,30,30,0.9)
                  - border-radius: 14px
                  - padding: 16px
                  - border: 1px solid rgba(255,255,255,0.1)
                name:
                  - font-size: 16px
                  - font-weight: 600
                  - color: white
                icon:
                  - width: 48px
                  - color: '#fde68a'
              custom_fields:
                details: |
                  [[[
                    var overall = (entity && entity.state) || '--';
                    var grass = (states['sensor.ws_pollen_grass'] || {}).state || '--';
                    var tree = (states['sensor.ws_pollen_tree'] || {}).state || '--';
                    var weed = (states['sensor.ws_pollen_weed'] || {}).state || '--';
                    var levelColor = function(v) {
                      if (!v || v === '--') return 'rgba(255,255,255,0.4)';
                      var s = v.toLowerCase();
                      return s.includes('very high') || s.includes('extreme') ? '#ef4444' : s.includes('high') ? '#f97316' : s.includes('medium') || s.includes('moderate') ? '#f59e0b' : '#10b981';
                    };
                    return '<div style="margin-top:8px;">'
                      + '<div style="font-size:28px;font-weight:200;color:' + levelColor(overall) + ';">' + overall + '</div>'
                      + '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:10px;line-height:1.8;">'
                      + '<div><strong>Grass:</strong> <span style="color:' + levelColor(grass) + ';">' + grass + '</span></div>'
                      + '<div><strong>Tree:</strong> <span style="color:' + levelColor(tree) + ';">' + tree + '</span></div>'
                      + '<div><strong>Weed:</strong> <span style="color:' + levelColor(weed) + ';">' + weed + '</span></div>'
                      + '</div></div>';
                  ]]]

      # ── MOON & SOLAR FORECAST (conditional) ─────────────────────────────────
      - type: grid
        column_span: 4
        columns: 2
        cards:
          - type: conditional
