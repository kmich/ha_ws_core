                    var cddRate = parseFloat((states['sensor.ws_cdd_rate'] || {}).state);
                    var fmt = function(v) { return isNaN(v) ? '--' : v.toFixed(3); };
                    var fmt2 = function(v) { return isNaN(v) ? '--' : v.toFixed(2); };
                    return '<div style="margin-top:8px;">'
                      + '<div style="display:flex;gap:20px;margin-top:4px;">'
                      + '<div><div style="font-size:24px;font-weight:200;color:#60a5fa;">' + fmt(hdd) + '</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">HDD today</div></div>'
                      + '<div><div style="font-size:24px;font-weight:200;color:#f87171;">' + fmt(cdd) + '</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">CDD today</div></div>'
