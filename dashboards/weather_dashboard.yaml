                    + '<div><strong>Dew point:</strong> ' + fmt(dew) + '\u00b0C</div>'
                    + '<div><strong>24h High:</strong> <span style="color:#f87171;">' + fmt(high) + '\u00b0C</span></div>'
                    + '<div><strong>24h Low:</strong> <span style="color:#60a5fa;">' + fmt(low) + '\u00b0C</span></div>'
                    + '<div><strong>24h Avg:</strong> ' + fmt(avg) + '\u00b0C</div>'
                    + '<div><strong>Humidity:</strong> ' + (isNaN(humid) ? '--' : humid.toFixed(0)) + '% \u00b7 ' + humLevel + '</div>'
                    + '</div></div>';
