                          if (isNaN(h)) return `<div style="color:rgba(255,255,255,0.75);">N/A</div>`;
                          const hDesc = states['sensor.ws_humidity_level']?.state || 'Comfortable';
                          const hColor = h > 80 ? '#F97316' : h > 70 ? '#FBBF24' : h > 40 ? '#22D3EE' : h > 20 ? '#FDE68A' : '#F87171';
                          return `
