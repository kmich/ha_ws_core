reset_rain_baseline:
  name: Reset rain baseline
  description: >-
    Resets the internal rain total baseline used to compute rain rate.
    Useful if your station resets the cumulative precipitation counter.
  fields:
    entry_id:
      name: Config entry ID (optional)
      description: >-
        If provided, only resets that specific WS Station config entry.
        If omitted, resets all WS Station entries.
      example: "abcd1234efgh5678"
      selector:
        text:

reset_learning_state:
  name: Reset learning state
  description: >-
    Resets some or all of the integration's persistent learned state
    (solar lux factor, forecast skill outcomes, dry/heat/frost streaks).
  fields:
    entry_id:
      name: Config entry ID (optional)
      description: >-
        If provided, only resets that specific WS Station config entry.
        If omitted, resets all WS Station entries.
      example: "abcd1234efgh5678"
      selector:
        text:
    target:
      name: Reset target
      description: Which learned state to reset
      default: all
      selector:
        select:
          options:
            - "all"
            - "solar"
            - "forecast"
            - "streaks"

export_learning_state:
  name: Export learning state
  description: >-
    Logs the current learning state to the HA log (for diagnostics).
  fields:
    entry_id:
      name: Config entry ID (optional)
      description: >-
        If provided, only exports that specific WS Station config entry.
      example: "abcd1234efgh5678"
      selector:
        text:

apply_calibration:
  name: Apply calibration offsets
  description: >-
    Writes calibration offsets directly into the integration's options and
    reloads. Use this to correct known sensor bias — compare your station
    against a trusted reference (calibrated instrument, nearby ASOS/MADIS
    station) and enter the difference here. Offsets are additive: a positive
    temperature offset means your sensor reads low. All units are metric
    (°C, %, hPa, m/s).
  fields:
    entry_id:
      name: Config entry ID (optional)
      description: >-
        If provided, only updates that specific WS Station config entry.
        If omitted, updates all WS Station entries.
      example: "abcd1234efgh5678"
      selector:
        text:
    cal_temp_c:
      name: Temperature offset (°C)
      description: Additive offset applied to raw temperature after unit conversion.
      example: -0.5
      selector:
        number:
          min: -10
          max: 10
          step: 0.1
          unit_of_measurement: "°C"
    cal_humidity:
      name: Humidity offset (%)
      description: Additive offset applied to raw relative humidity.
      example: 3.0
      selector:
        number:
          min: -20
          max: 20
          step: 0.5
          unit_of_measurement: "%"
    cal_pressure_hpa:
      name: Pressure offset (hPa)
      description: Additive offset applied to raw station pressure.
      example: 1.2
      selector:
        number:
          min: -20
          max: 20
          step: 0.1
          unit_of_measurement: "hPa"
    cal_wind_ms:
      name: Wind speed offset (m/s)
      description: Additive offset applied to raw wind speed.
      example: -0.3
      selector:
        number:
          min: -5
          max: 5
          step: 0.1
          unit_of_measurement: "m/s"
